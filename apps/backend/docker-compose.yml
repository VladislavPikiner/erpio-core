version: '3.8'

services:
  # Бэкенд приложение
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: {{PROJECT_NAME}}-backend
    # Внешние порты убраны, так как трафик идет через Traefik (port 443 -> 3000)
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/erpio_db?schema=public
      - JWT_SECRET=super-secret-enterprise-key
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erpio-network
      - traefik_traefik-public
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{PROJECT_NAME}}.rule=Host(`{{PROJECT_DOMAIN}}`)"
      - "traefik.http.routers.{{PROJECT_NAME}}.entrypoints=websecure"
      - "traefik.http.routers.{{PROJECT_NAME}}.tls.certresolver=myresolver"
      - "traefik.http.services.{{PROJECT_NAME}}.loadbalancer.server.port=3000"

  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: {{PROJECT_NAME}}-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=erpio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erpio-network
    restart: always

networks:
  erpio-network:
    driver: bridge
  traefik_traefik-public:
    external: true

volumes:
  postgres_data:
