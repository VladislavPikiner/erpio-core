version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: erpio-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@erpio-core-db:5432/erpio_db?schema=public
      - SENTRY_DSN=http://012dbac59a0542e9b87b9edbca1ddfb8@glitchtip:8000/1
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - erpio-core-db
      - erpio-core-redis
    networks:
      - erpio-network
    restart: always

  erpio-core-db:
    image: postgres:15-alpine
    container_name: erpio-core-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=erpio_db
    volumes:
      - erpio_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - erpio-network
    restart: always

  erpio-core-redis:
    image: redis:7-alpine
    container_name: erpio-core-redis
    ports:
      - "6379:6379"
    networks:
      - erpio-network
    restart: always

  glitchtip:
    image: glitchtip/glitchtip
    container_name: glitchtip_glitchtip
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=postgres://glitchtip:glitchtip@glitchtip-db:5432/glitchtip
      - REDIS_URL=redis://glitchtip-redis:6379/0
      - DEFAULT_FROM_EMAIL=webmaster@localhost
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
      - SECRET_KEY=change-me-to-something-secure
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    networks:
      - erpio-network
    restart: always

  glitchtip-db:
    image: postgres:15
    container_name: glitchtip-db
    environment:
      - POSTGRES_USER=glitchtip
      - POSTGRES_PASSWORD=glitchtip
      - POSTGRES_DB=glitchtip
    networks:
      - erpio-network
    restart: always

  glitchtip-redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    networks:
      - erpio-network
    restart: always

networks:
  erpio-network:
    driver: bridge

volumes:
  erpio_postgres_data:
